name: Deploy to Staging

on:
  push:
    branches:
      - staging
  repository_dispatch:
    types:
      - deploy-trigger
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Staging Docker image tag"
        required: true
        default: "staging"
        type: string

permissions:
  contents: read

env:
  GCP_HOST: 34.101.41.6
  GCP_USER: pongo
  DEPLOY_DIR: /opt/yomu

jobs:
  deploy-staging:
    name: Deploy Staging Environment
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.yomu.my.id
    steps:
      - name: Get image tag from dispatch payload
        id: dispatch
        run: |
          if [[ -n "${{ github.event.client_payload.image_tag }}" ]]; then
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "image_tag source: repository_dispatch payload"
          else
            echo "image_tag=${{ inputs.image_tag || 'staging' }}" >> "$GITHUB_OUTPUT"
            echo "image_tag source: workflow_dispatch inputs or default"
          fi

      - name: Update staging services on Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: IMAGE_TAG,POSTGRES_PASSWORD,JWT_SECRET,INTERNAL_API_KEY,JAVA_CORE_API_KEY,GRAFANA_ADMIN_PASSWORD
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_DIR }}"

            # Update .env secrets if provided
            for var in POSTGRES_PASSWORD JWT_SECRET INTERNAL_API_KEY JAVA_CORE_API_KEY GRAFANA_ADMIN_PASSWORD; do
              val="${!var}"
              if [[ -z "${val}" ]]; then
                echo "SKIP: ${var} is empty in GitHub Secrets — preserving existing .env value"
                continue
              fi
              if grep -q "^${var}=" .env 2>/dev/null; then
                sed -i "s/^${var}=.*/${var}=${val}/" .env
              else
                echo "${var}=${val}" >> .env
              fi
            done

            # Verify critical secrets exist
            for var in POSTGRES_PASSWORD JWT_SECRET INTERNAL_API_KEY JAVA_CORE_API_KEY GRAFANA_ADMIN_PASSWORD; do
              current_val=$(grep "^${var}=" .env 2>/dev/null | cut -d'=' -f2-)
              if [[ -z "${current_val}" ]]; then
                echo "ERROR: ${var} is empty in .env — deployment blocked."
                echo "Fix the ${var} GitHub Secret in yomu-infra repo before retrying."
                exit 1
              fi
            done

            export STAGING_IMAGE_TAG="${IMAGE_TAG}"
            echo "Deploying staging with image tag: ${STAGING_IMAGE_TAG}"

            bash scripts/deploy-staging.sh --image-tag "${STAGING_IMAGE_TAG}"
        env:
          IMAGE_TAG: ${{ steps.dispatch.outputs.image_tag }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          JAVA_CORE_API_KEY: ${{ secrets.JAVA_CORE_API_KEY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

      - name: Verify staging health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_DIR }}"

            MAX_ATTEMPTS=30
            ATTEMPT=0
            ALL_HEALTHY=false

            while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
              ATTEMPT=$((ATTEMPT + 1))

              UNHEALTHY=$(docker service ls \
                --format '{{.Name}} {{.Replicas}}' |
                grep -E 'yomu_(java-staging|rust-staging|frontend-staging)' |
                awk '$2 !~ /1\/1/ {print $1 " " $2}' || true)

              if [[ -z "${UNHEALTHY}" ]]; then
                ALL_HEALTHY=true
                break
              fi

              echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: some services still starting..."
              sleep 5
            done

            if [[ "${ALL_HEALTHY}" != "true" ]]; then
              echo "ERROR: Staging services did not reach healthy state within $((MAX_ATTEMPTS * 5)) seconds"
              docker service ls --filter name=yomu_ --format 'table {{.Name}}\t{{.Replicas}}\t{{.Image}}'
              exit 1
            fi

            echo "=== Staging deployed successfully ==="
            docker service ls --filter name=yomu_ --format 'table {{.Name}}\t{{.Replicas}}\t{{.Image}}'

            # Quick endpoint smoke tests via localhost
            echo "=== Smoke tests ==="
            PASS=0
            FAIL=0

            if curl -sf --max-time 10 -k -H 'Host: java-staging.yomu.my.id' \
              https://localhost/actuator/health/readiness > /dev/null 2>&1; then
              echo "  [PASS] Java-staging readiness"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Java-staging readiness"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 10 -k -H 'Host: rust-staging.yomu.my.id' \
              https://localhost/health > /dev/null 2>&1; then
              echo "  [PASS] Rust-staging health"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Rust-staging health"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 10 -k -L -H 'Host: staging.yomu.my.id' \
              https://localhost/ > /dev/null 2>&1; then
              echo "  [PASS] Frontend-staging root"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Frontend-staging root"
              FAIL=$((FAIL + 1))
            fi

            echo "Smoke tests: ${PASS} passed, ${FAIL} failed"
            [[ ${FAIL} -eq 0 ]] || exit 1
