name: Deploy to Production (Blue-Green)

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - deploy-trigger
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"
        type: string
      target_env:
        description: "Target environment (blue/green). Leave blank to auto-detect."
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  GCP_HOST: 34.101.41.6
  GCP_USER: pongo
  DEPLOY_DIR: /opt/yomu

jobs:
  detect-target:
    name: Detect Target Environment
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.parse.outputs.target_env }}
      current_env: ${{ steps.parse.outputs.current_env }}
    steps:
      - name: Get current active environment
        id: ssh
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            ROUTING_FILE="${{ env.DEPLOY_DIR }}/traefik/dynamic/routing.yml"
            if [[ -f "${ROUTING_FILE}" ]]; then
              if grep -q 'frontend-blue' "${ROUTING_FILE}"; then
                echo "blue"
              elif grep -q 'frontend-green' "${ROUTING_FILE}"; then
                echo "green"
              else
                echo "unknown"
              fi
            else
              echo "unknown"
            fi

      - name: Determine target environment
        id: parse
        run: |
          CURRENT="${{ steps.ssh.outputs.stdout }}"
          CURRENT="${CURRENT#"${CURRENT%%[![:space:]]*}"}"
          CURRENT="${CURRENT%"${CURRENT##*[![:space:]]}"}"
          echo "current_env=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current active environment: ${CURRENT}"

          TARGET="${{ inputs.target_env }}"
          if [[ -n "${TARGET}" ]]; then
            echo "target_env=${TARGET}" >> "$GITHUB_OUTPUT"
            echo "Manual target selected: ${TARGET}"
            exit 0
          fi

          if [[ "${CURRENT}" == "blue" ]]; then
            echo "target_env=green" >> "$GITHUB_OUTPUT"
          elif [[ "${CURRENT}" == "green" ]]; then
            echo "target_env=blue" >> "$GITHUB_OUTPUT"
          else
            echo "target_env=blue" >> "$GITHUB_OUTPUT"
          fi

      - name: Print deployment plan
        run: |
          echo "Current active : ${{ steps.parse.outputs.current_env }}"
          echo "Will deploy to : ${{ steps.parse.outputs.target_env }}"
          echo "Image tag      : ${{ inputs.image_tag }}"

  deploy-to-target:
    name: Deploy to ${{ needs.detect-target.outputs.target_env }}
    runs-on: ubuntu-latest
    needs: detect-target
    environment:
      name: production
      url: https://yomu.my.id
    steps:
      - name: Deploy to inactive environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: IMAGE_TAG,TARGET_ENV,POSTGRES_PASSWORD,JWT_SECRET,INTERNAL_API_KEY,JAVA_CORE_API_KEY,GRAFANA_ADMIN_PASSWORD
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_DIR }}"

            # Ensure IMAGE_TAG has a default
            IMAGE_TAG="${IMAGE_TAG:-latest}"

            # Write secrets to .env if it doesn't exist
            if [[ ! -f .env ]]; then
              {
                echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
                echo "JWT_SECRET=${JWT_SECRET}"
                echo "INTERNAL_API_KEY=${INTERNAL_API_KEY}"
                echo "JAVA_CORE_API_KEY=${JAVA_CORE_API_KEY}"
                echo "GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}"
              } > .env
            else
              # Update secrets safely using sed with fallback to append
              for var in POSTGRES_PASSWORD JWT_SECRET INTERNAL_API_KEY JAVA_CORE_API_KEY GRAFANA_ADMIN_PASSWORD; do
                val="${!var}"
                if grep -q "^${var}=" .env 2>/dev/null; then
                  sed -i "s/^${var}=.*/${var}=${val}/" .env
                else
                  echo "${var}=${val}" >> .env
                fi
              done
            fi

            echo "=== Deploying ${TARGET_ENV} environment (tag: ${IMAGE_TAG}) ==="
            bash scripts/deploy-${TARGET_ENV}.sh --image-tag "${IMAGE_TAG}"
            echo "Deployment script completed."
        env:
          IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
          TARGET_ENV: ${{ needs.detect-target.outputs.target_env }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          JAVA_CORE_API_KEY: ${{ secrets.JAVA_CORE_API_KEY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [detect-target, deploy-to-target]
    steps:
      - name: Wait for services to stabilize
        run: sleep 10

      - name: Check target services are healthy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: TARGET_ENV
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_DIR }}"
            COMPOSE_FILE="docker-compose/docker-compose.${TARGET_ENV}.yml"

            MAX_ATTEMPTS=30
            ATTEMPT=0
            ALL_HEALTHY=false

            while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
              ATTEMPT=$((ATTEMPT + 1))
              UNHEALTHY=$(docker compose -f "${COMPOSE_FILE}" ps --format '{{.Name}} {{.Health}}' 2>/dev/null | grep -v -E '(healthy|starting)' || true)

              if [[ -z "${UNHEALTHY}" ]]; then
                ALL_HEALTHY=true
                break
              fi

              echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: services still starting..."
              sleep 5
            done

            if [[ "${ALL_HEALTHY}" != "true" ]]; then
              echo "ERROR: Services did not become healthy within $((MAX_ATTEMPTS * 5)) seconds"
              docker compose -f "${COMPOSE_FILE}" ps
              exit 1
            fi

            echo "All services are healthy."
            docker compose -f "${COMPOSE_FILE}" ps --format "table {{.Name}}\t{{.Status}}\t{{.Health}}"
        env:
          TARGET_ENV: ${{ needs.detect-target.outputs.target_env }}

      - name: Smoke test endpoints via localhost
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -euo pipefail

            PASS=0
            FAIL=0

            if curl -sf --max-time 10 -k -H 'Host: java.yomu.my.id' https://localhost/actuator/health/readiness > /dev/null 2>&1; then
              echo "  [PASS] Java API readiness"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Java API readiness"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 10 -k -H 'Host: rust.yomu.my.id' https://localhost/health > /dev/null 2>&1; then
              echo "  [PASS] Rust API health"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Rust API health"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 10 -k -L -H 'Host: yomu.my.id' https://localhost/ > /dev/null 2>&1; then
              echo "  [PASS] Frontend root"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Frontend root"
              FAIL=$((FAIL + 1))
            fi

            echo ""
            echo "Smoke tests: ${PASS} passed, ${FAIL} failed"

            if [[ ${FAIL} -gt 0 ]]; then
              exit 1
            fi

  switch-traffic:
    name: Switch Traffic
    runs-on: ubuntu-latest
    needs: [detect-target, health-check]
    steps:
      - name: Run switch-traffic.sh
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: TARGET_ENV
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_DIR }}"
            bash scripts/switch-traffic.sh "${TARGET_ENV}"
        env:
          TARGET_ENV: ${{ needs.detect-target.outputs.target_env }}

  schedule-cleanup:
    name: Schedule Old Environment Cleanup
    runs-on: ubuntu-latest
    needs: [detect-target, switch-traffic]
    steps:
      - name: Schedule old environment auto-stop after 30 minutes
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: CURRENT_ENV,TARGET_ENV,DEPLOY_DIR
          script: |
            set -euo pipefail
            cd "${DEPLOY_DIR}"

            if [[ "${CURRENT_ENV}" == "unknown" || "${CURRENT_ENV}" == "${TARGET_ENV}" ]]; then
              echo "No previous environment to stop."
              exit 0
            fi

            OLD="${CURRENT_ENV}"
            echo "Scheduling ${OLD} environment stop in 30 minutes..."

            # Create a one-shot script to stop old environment
            STOP_SCRIPT="/tmp/stop-${OLD}-job.sh"
            printf '%s\n' '#!/bin/bash' 'set -euo pipefail' "cd \"${DEPLOY_DIR}\" && docker compose -f docker-compose/docker-compose.${OLD}.yml down || true" > "${STOP_SCRIPT}"
            chmod +x "${STOP_SCRIPT}"

            # Schedule with at in 30 minutes
            if command -v at >/dev/null 2>&1; then
              echo "bash /tmp/stop-${OLD}-job.sh" | at now + 30 minutes
              echo "Scheduled auto-stop of ${OLD} environment via at."
            else
              # Fallback: background nohup sleep
              nohup bash -c "sleep 1800 && bash /tmp/stop-${OLD}-job.sh" > "/tmp/stop-${OLD}.log" 2>&1 &
              echo "Scheduled auto-stop of ${OLD} environment via background sleep (1800s)."
            fi

            echo ""
            echo "=== Deployment Summary ==="
            echo "Previous environment : ${OLD}"
            echo "Current environment  : ${TARGET_ENV}"
            echo "Auto-stop scheduled  : ${OLD} in 30 minutes"
            echo "To cancel auto-stop, SSH to the host and run:"
            echo "  atrm \u003cjobnumber\u003e   (if using at)"
            echo "  pkill -f 'stop-${OLD}-job'"
        env:
          CURRENT_ENV: ${{ needs.detect-target.outputs.current_env }}
          TARGET_ENV: ${{ needs.detect-target.outputs.target_env }}
          DEPLOY_DIR: /opt/yomu
