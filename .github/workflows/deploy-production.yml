name: Deploy Swarm Stack

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - deploy-trigger
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. main or specific commit SHA)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

env:
  GCP_HOST: 34.101.41.6
  GCP_USER: pongo
  DEPLOY_DIR: /opt/yomu

jobs:
  deploy:
    name: Deploy / Update Swarm Stack
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://yomu.my.id
    steps:
      - name: Parse image tag
        id: dispatch
        run: |
          if [[ -n "${{ github.event.client_payload.image_tag }}" ]]; then
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy swarm stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/yomu
            export IMAGE_TAG="${IMAGE_TAG}"
            echo "=== Deploying Swarm stack (infra only) ==="
            docker stack deploy -c docker-compose/docker-compose.swarm.yml yomu

            echo "=== Updating production app images ==="
            REPO="ghcr.io/advprog-2026-a14-project"

            docker service update \
              --with-registry-auth \
              --image "${REPO}/yomu-backend-java:${IMAGE_TAG}" \
              yomu_java

            docker service update \
              --with-registry-auth \
              --image "${REPO}/yomu-backend-rust:${IMAGE_TAG}" \
              yomu_rust

            docker service update \
              --with-registry-auth \
              --image "${REPO}/yomu-frontend:${IMAGE_TAG}" \
              yomu_frontend

            echo "=== Deployment complete ==="
            echo "Image tag: ${IMAGE_TAG}"
        env:
          IMAGE_TAG: ${{ steps.dispatch.outputs.image_tag }}

      - name: Wait for rolling update
        run: sleep 120

      - name: Smoke test endpoints
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -euo pipefail
            PASS=0
            FAIL=0

            # Wait for Traefik to fully reload certificates and routes
            echo "Waiting 15s for Traefik to finish reload..."
            sleep 15

            echo "=== Testing production endpoints via public hostnames ==="

            if curl -sf --max-time 15 -k https://java.yomu.my.id/actuator/health/readiness > /dev/null 2>&1; then
              echo "  [PASS] Java API readiness"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Java API readiness"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 15 -k https://rust.yomu.my.id/health > /dev/null 2>&1; then
              echo "  [PASS] Rust API health"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Rust API health"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 15 -k -L https://yomu.my.id/ > /dev/null 2>&1; then
              echo "  [PASS] Frontend root"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Frontend root"
              FAIL=$((FAIL + 1))
            fi

            echo "Smoke tests: ${PASS} passed, ${FAIL} failed"
            echo "If failed, check: docker service logs yomu_java / yomu_rust / yomu_frontend"
            echo "Verify .env on host: grep 'JWT_SECRET' /opt/yomu/.env"
            [[ ${FAIL} -eq 0 ]] || exit 1