name: Deploy Swarm Stack

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - deploy-trigger
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. main or specific commit SHA)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

env:
  GCP_HOST: 34.101.41.6
  GCP_USER: pongo
  DEPLOY_DIR: /opt/yomu

jobs:
  deploy:
    name: Deploy / Update Swarm Stack
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://yomu.my.id
    steps:
      - name: Parse image tag
        id: dispatch
        run: |
          if [[ -n "${{ github.event.client_payload.image_tag }}" ]]; then
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Update .env and deploy swarm stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: IMAGE_TAG,DEPLOY_DIR
          script: |
            set -euo pipefail
            cd "${DEPLOY_DIR}"

            # Ensure .env exists and has sane defaults (do NOT overwrite with empty secrets)
            if [[ ! -f .env ]]; then
              touch .env
            fi
            # Write image tag override if needed
            export IMAGE_TAG="${IMAGE_TAG}"
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            echo "=== Deploying Swarm stack with image tag: ${IMAGE_TAG} ==="
            docker stack deploy -c docker-compose/docker-compose.swarm.yml yomu
        env:
          IMAGE_TAG: ${{ steps.dispatch.outputs.image_tag }}

      - name: Wait for rolling update
        run: sleep 45

      - name: Smoke test endpoints
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.GCP_HOST }}
          username: ${{ env.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -euo pipefail

            PASS=0
            FAIL=0

            if curl -sf --max-time 10 -k -H 'Host: java.yomu.my.id' https://localhost/actuator/health/readiness > /dev/null 2>&1; then
              echo "  [PASS] Java API readiness"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Java API readiness"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 10 -k -H 'Host: rust.yomu.my.id' https://localhost/health > /dev/null 2>&1; then
              echo "  [PASS] Rust API health"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Rust API health"
              FAIL=$((FAIL + 1))
            fi

            if curl -sf --max-time 10 -k -L -H 'Host: yomu.my.id' https://localhost/ > /dev/null 2>&1; then
              echo "  [PASS] Frontend root"
              PASS=$((PASS + 1))
            else
              echo "  [FAIL] Frontend root"
              FAIL=$((FAIL + 1))
            fi

            echo "Smoke tests: ${PASS} passed, ${FAIL} failed"
            [[ ${FAIL} -eq 0 ]] || exit 1