name: Test Deployment Scripts

on:
  pull_request:
    paths:
      - "scripts/**"
      - "docker-compose/**"
      - "traefik/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "docker-compose/**"
      - "traefik/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck on deployment scripts
        run: |
          shellcheck -x scripts/*.sh || true

  validate-swarm-config:
    name: Validate Swarm Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy .env for validation
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=dummy-secret
          JWT_SECRET=this_is_a_dummy_jwt_secret_that_is_long_enough_for_swarm_validation_only
          INTERNAL_API_KEY=dummy-internal-key
          JAVA_CORE_API_KEY=dummy-java-key
          GRAFANA_ADMIN_PASSWORD=dummy-grafana-password
          EOF

      - name: Validate docker-compose.swarm.yml
        run: |
          cp .env docker-compose/.env
          docker compose -f docker-compose/docker-compose.swarm.yml --env-file docker-compose/.env config > /dev/null

  validate-traefik-configs:
    name: Validate Traefik YAML Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          pip install yamllint

      - name: Run yamllint on traefik configs
        run: |
          yamllint -d relaxed traefik/ || true

      - name: Run yamllint on other YAML files
        run: |
          yamllint -d relaxed prometheus/ grafana/ loki/ tempo/ otel/ || true

  workflow-syntax:
    name: Validate Workflow YAML Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          chmod +x actionlint

      - name: Run actionlint on deployment workflows
        run: |
          ./actionlint -color .github/workflows/deploy-production.yml .github/workflows/deploy-staging.yml .github/workflows/test-deploy.yml
