groups:
  - name: yomu-alerts
    rules:
      - alert: PostDeployHighErrorRate
        expr: |
          (
            sum(rate(traefik_service_requests_total{code=~"5.."}[2m]))
            /
            sum(rate(traefik_service_requests_total[2m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          environment: production
          service: platform
        annotations:
          summary: "High error rate detected post-deployment"
          description: >-
            Overall platform error rate is {{ $value | humanizePercentage }}
            (5xx responses) over the last 2 minutes. This may indicate issues
            following a recent deployment.

      - alert: ServiceDown
        expr: up{job=~"frontend|java|rust|frontend-staging|java-staging|rust-staging"} == 0
        for: 1m
        labels:
          severity: critical
          environment: production
          service: platform
        annotations:
          summary: "Service {{ $labels.service }} ({{ $labels.environment }}) is down"
          description: >-
            The {{ $labels.service }} service in the {{ $labels.environment }}
            slot has been unreachable for more than 1 minute.

      - alert: HighMemoryUsage
        expr: jvm_memory_used_bytes / jvm_memory_max_bytes > 0.9
        for: 2m
        labels:
          severity: warning
          environment: production
          service: platform
        annotations:
          summary: "High memory usage on {{ $labels.service }} ({{ $labels.environment }})"
          description: >-
            JVM memory usage for {{ $labels.service }} in the
            {{ $labels.environment }} slot is {{ $value | humanizePercentage }}.
            Note: this alert relies on JVM metrics and currently covers
            Java services only.

      - alert: DatabaseConnectionFailures
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          environment: production
          service: platform
        annotations:
          summary: "PostgreSQL connection failures detected"
          description: >-
            The PostgreSQL exporter is reporting connection failures.
            PostgreSQL may be down or unreachable.

      - alert: HighErrorRate
        expr: rate(traefik_service_requests_total{code=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          environment: production
          service: traefik
        annotations:
          summary: "High error rate detected on {{ $labels.service }}"
          description: >-
            Error rate for {{ $labels.service }} is {{ $value | printf "%.2f" }}
            requests/sec (5xx responses over last 5m). Threshold: 0.1 req/s.

      - alert: AllProductionServicesDown
        expr: >-
          count(up{job=~"java|rust|frontend"} == 1) == 0
        for: 2m
        labels:
          severity: critical
          environment: production
          service: platform
        annotations:
          summary: "All production services are down"
          description: >-
            No production services (java, rust, frontend) are reachable.
            This indicates a platform-wide outage.

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: warning
          environment: infrastructure
          service: node
        annotations:
          summary: "Disk space below 10% on {{ $labels.instance }}"
          description: >-
            Available disk space on {{ $labels.mountpoint }} is
            {{ $value | printf "%.0f" }}% of total. Threshold: 10%.

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(traefik_service_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          environment: production
          service: traefik
        annotations:
          summary: "High p95 latency through Traefik"
          description: >-
            95th percentile request latency is {{ $value | printf "%.2f" }}s.
            Threshold: 2s.

      - alert: JavaHeapHigh
        expr: jvm_memory_used_bytes / jvm_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          environment: "{{ $labels.environment }}"
          service: java
        annotations:
          summary: "JVM heap usage above 85% on {{ $labels.instance }}"
          description: >-
            JVM memory usage is at {{ $value | printf "%.0f" }}% for
            {{ $labels.instance }} ({{ $labels.environment }}). Threshold: 85%.

      # ── Extended JVM Profiling Alerts ── 
      - alert: JavaThreadsHigh
        expr: jvm_threads_live_threads > 300
        for: 5m
        labels:
          severity: warning
          environment: "{{ $labels.environment }}"
          service: java
        annotations:
          summary: "JVM thread count high on {{ $labels.instance }}"
          description: >-
            JVM live threads at {{ $value | printf "%.0f" }} ({{ $labels.environment }}). Threshold: 300.

      - alert: JavaGCPauseTooLong
        expr: jvm_gc_pause_seconds_max > 1
        for: 2m
        labels:
          severity: warning
          environment: "{{ $labels.environment }}"
          service: java
        annotations:
          summary: "JVM GC pause exceeded 1s on {{ $labels.instance }}"
          description: >-
            GC pause max is {{ $value | printf "%.2f" }}s ({{ $labels.environment }}). Threshold: 1s.

      # ── Database Profiling Alerts ──
      - alert: DBCacheHitRatioLow
        expr: yomu:db_pg_cache_hit_ratio < 95
        for: 5m
        labels:
          severity: warning
          environment: production
          service: database
        annotations:
          summary: "PostgreSQL cache hit ratio low"
          description: >-
            Database cache hit ratio is {{ $value | printf "%.1f" }}% for {{ $labels.datname }}.
            Threshold: 95%.

      - alert: DBConnectionsHigh
        expr: pg_stat_activity_count{datname=~"yomu_.*"} > 80
        for: 2m
        labels:
          severity: warning
          environment: production
          service: database
        annotations:
          summary: "PostgreSQL connections high for {{ $labels.datname }}"
          description: >-
            Active connections: {{ $value | printf "%.0f" }} on {{ $labels.datname }}.
            Threshold: 80.

      # ── Rust / HTTP Profiling Alerts ──
      - alert: RustP99LatencyHigh
        expr: histogram_quantile(0.99, sum by (le) (rate(axum_prometheus_requests_duration_seconds_bucket{job=~"rust|rust-staging"}[1m]))) > 2
        for: 2m
        labels:
          severity: warning
          environment: production
          service: rust
        annotations:
          summary: "Rust API p99 latency high"
          description: >-
            Rust API p99 latency is {{ $value | printf "%.3f" }}s ({{ $labels.environment }}). Threshold: 2s.

      # ── Business / SRE Alerts ──
      - alert: LoginErrorRateHigh
        expr: yomu:login_success_rate < 0.95
        for: 5m
        labels:
          severity: warning
          environment: production
          service: auth
        annotations:
          summary: "Login success rate below 95%"
          description: >-
            Login success rate is {{ $value | humanizePercentage }} (1-min window).
            Threshold: 95%.

      - alert: SLAAvailabilityDropping
        expr: yomu:sla_availability_1h < 99.9
        for: 5m
        labels:
          severity: critical
          environment: production
          service: platform
        annotations:
          summary: "1h SLA availability dropped below 99.9%"
          description: >-
            Platform availability over the last hour is {{ $value | printf "%.3f" }}%.
            Threshold: 99.9%.
