groups:
  - name: yomu-recording-rules
    interval: 30s
    rules:
      # ── Traffic (Traefik) ──
      - record: yomu:service_request_rate
        expr: sum(rate(traefik_service_requests_total[5m])) by (service)

      - record: yomu:service_error_rate
        expr: sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) by (service)

      - record: yomu:service_latency_p95
        expr: histogram_quantile(0.95, sum(rate(traefik_service_request_duration_seconds_bucket[5m])) by (service, le))

      # ── JVM Profiling ──
      - record: yomu:java_heap_usage_ratio
        expr: jvm_memory_used_bytes{area="heap"} / clamp_min(jvm_memory_max_bytes{area="heap"}, 1)

      - record: yomu:java_gc_pause_per_minute
        expr: sum by (job, action) (rate(jvm_gc_pause_seconds_sum[1m]))

      # ── Database ──
      - record: yomu:db_pg_cache_hit_ratio
        expr: |
          (
            rate(pg_stat_database_blks_hit[1m])
            /
            (rate(pg_stat_database_blks_hit[1m]) + rate(pg_stat_database_blks_read[1m]))
          ) * 100

      - record: yomu:db_connections
        expr: pg_stat_activity_count{datname=~"yomu_.*"}

      - record: yomu:hikaricp_connections_wait_time
        expr: rate(hikaricp_connections_wait_seconds_sum[1m]) / clamp_min(rate(hikaricp_connections_wait_seconds_count[1m]), 1)

      # ── Redis ──
      - record: yomu:redis_memory_utilization_ratio
        expr: redis_memory_used_bytes / clamp_min(redis_memory_max_bytes, 1)

      # ── SLA / Availability ──
      - record: yomu:sla_availability_1h
        expr: |
          (
            1
            - (avg_over_time(up{job=~"java-(blue|green|staging)"}[1h]) < 1)
          ) * 100

      - record: yomu:sla_availability_24h
        expr: |
          (
            1
            - (avg_over_time(up{job=~"java-(blue|green|staging)"}[24h]) < 1)
          ) * 100

      # ── Business Metrics ──
      - record: yomu:login_success_rate
        expr: |
          sum(rate(http_server_requests_seconds_count{uri=~".*/auth/login$", status=~"2.."}[1m]))
          /
          clamp_min(
            sum(rate(http_server_requests_seconds_count{uri=~".*/auth/login$"}[1m])),
            1
          )

      - record: yomu:api_error_budget
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m]))
          /
          clamp_min(
            sum(rate(http_server_requests_seconds_count[1m])),
            1
          )
