services:
  frontend-blue:
    image: ghcr.io/advprog-2026-a14-project/yomu-frontend:${IMAGE_TAG:-latest}
    container_name: frontend-blue
    restart: unless-stopped
    environment:
      CORE_API_BASE_URL: http://java-blue:8080
      RUST_ENGINE_URL: http://rust-blue:8080
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
    networks:
      - yomu-blue-network
      - yomu-shared-network
    depends_on:
      java-blue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  java-blue:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-java:${IMAGE_TAG:-latest}
    container_name: java-blue
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/yomu_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      RUST_ENGINE_BASE_URL: http://rust-blue:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - yomu-blue-network
      - yomu-shared-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  rust-blue:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-rust:${IMAGE_TAG:-latest}
    container_name: rust-blue
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/yomu_engine
      REDIS_URL: redis://redis:6379
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      JAVA_CORE_URL: http://java-blue:8080
      JAVA_CORE_API_KEY: ${JAVA_CORE_API_KEY:?JAVA_CORE_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GRPC_PORT: "50051"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - yomu-blue-network
      - yomu-shared-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      java-blue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  yomu-blue-network:
    name: yomu-blue-network
    driver: bridge
  yomu-shared-network:
    external: true