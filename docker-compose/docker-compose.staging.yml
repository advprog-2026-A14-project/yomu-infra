services:
  postgres-staging:
    image: postgres:18-alpine
    container_name: postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: yomu_db_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - yomu-staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis-staging:
    image: redis:8-alpine
    container_name: redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_staging_data:/data
    networks:
      - yomu-staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  frontend-staging:
    image: ghcr.io/advprog-2026-a14-project/yomu-frontend:${STAGING_IMAGE_TAG:-staging}
    container_name: frontend-staging
    restart: unless-stopped
    environment:
      CORE_API_BASE_URL: http://java-staging:8080
      RUST_ENGINE_URL: http://rust-staging:8080
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: staging
    networks:
      - yomu-staging-network
      - yomu-shared-network
    depends_on:
      java-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  java-staging:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-java:${STAGING_IMAGE_TAG:-staging}
    container_name: java-staging
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-staging:5432/yomu_db_staging
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      RUST_ENGINE_BASE_URL: http://rust-staging:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - yomu-staging-network
      - yomu-shared-network
    depends_on:
      postgres-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  rust-staging:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-rust:${STAGING_IMAGE_TAG:-staging}
    container_name: rust-staging
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres-staging:5432/yomu_engine_staging
      REDIS_URL: redis://redis-staging:6379
      REDIS_KEY_PREFIX: staging_
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      JAVA_CORE_URL: http://java-staging:8080
      JAVA_CORE_API_KEY: ${JAVA_CORE_API_KEY:?JAVA_CORE_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    networks:
      - yomu-staging-network
      - yomu-shared-network
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
      java-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  yomu-staging-network:
    name: yomu-staging-network
    driver: bridge
  yomu-shared-network:
    external: true
