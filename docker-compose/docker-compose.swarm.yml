version: '3.8'

services:
  traefik:
    image: traefik:v3.6
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/yomu/traefik/traefik.swarm.yml:/etc/traefik/traefik.yml:ro
      - /opt/yomu/traefik/acme.json:/etc/traefik/acme.json
      - /opt/yomu/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
  postgres:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - /opt/yomu/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yomu_password}
      POSTGRES_DB: yomu_db
    volumes:
      - postgres_data:/var/lib/postgresql
      - /opt/yomu/scripts/init-databases.sql:/docker-entrypoint-initdb.d/02-init-databases.sql:ro
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  java:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-java:main
    env_file:
      - /opt/yomu/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/yomu_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-yomu_password}
      SERVER_PORT: "8080"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      RUST_ENGINE_BASE_URL: http://rust:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.java.rule=Host(`java.yomu.my.id`)"
        - "traefik.http.routers.java.service=java"
        - "traefik.http.routers.java.tls.certresolver=letsencrypt"
        - "traefik.http.services.java.loadbalancer.server.port=8080"
        - "traefik.http.services.java.loadbalancer.healthcheck.path=/actuator/health/readiness"
        - "traefik.http.services.java.loadbalancer.healthcheck.interval=15s"

  rust:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-rust:main
    env_file:
      - /opt/yomu/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-yomu_password}@postgres:5432/yomu_engine
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: prod_
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      JAVA_CORE_URL: http://java:8080
      SERVER_PORT: "8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rust.rule=Host(`rust.yomu.my.id`)"
        - "traefik.http.routers.rust.service=rust"
        - "traefik.http.routers.rust.tls.certresolver=letsencrypt"
        - "traefik.http.services.rust.loadbalancer.server.port=8080"
        - "traefik.http.services.rust.loadbalancer.healthcheck.path=/health"
        - "traefik.http.services.rust.loadbalancer.healthcheck.interval=15s"

  frontend:
    image: ghcr.io/advprog-2026-a14-project/yomu-frontend:main
    env_file:
      - /opt/yomu/.env
    environment:
      CORE_API_BASE_URL: http://java:8080
      RUST_ENGINE_URL: http://rust:8080
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=Host(`yomu.my.id`)"
        - "traefik.http.routers.frontend.service=frontend"
        - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.frontend.loadbalancer.server.port=3000"
        - "traefik.http.services.frontend.loadbalancer.healthcheck.path=/"
        - "traefik.http.services.frontend.loadbalancer.healthcheck.interval=15s"

  postgres-staging:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yomu_password}
      POSTGRES_DB: yomu_db_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql
      - /opt/yomu/scripts/init-databases.sql:/docker-entrypoint-initdb.d/02-init-databases.sql:ro
    networks:
      - yomu-overlay-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis-staging:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_staging_data:/data
    networks:
      - yomu-overlay-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  java-staging:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-java:staging
    env_file:
      - /opt/yomu/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-staging:5432/yomu_db_staging
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-yomu_password}
      SERVER_PORT: "8080"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      RUST_ENGINE_BASE_URL: http://rust-staging:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.java-staging.rule=Host(`java-staging.yomu.my.id`)"
        - "traefik.http.routers.java-staging.service=java-staging"
        - "traefik.http.routers.java-staging.tls.certresolver=letsencrypt"
        - "traefik.http.services.java-staging.loadbalancer.server.port=8080"
        - "traefik.http.services.java-staging.loadbalancer.healthcheck.path=/actuator/health/readiness"

  rust-staging:
    image: ghcr.io/advprog-2026-a14-project/yomu-backend-rust:staging
    env_file:
      - /opt/yomu/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-yomu_password}@postgres-staging:5432/yomu_engine_staging
      REDIS_URL: redis://redis-staging:6379
      REDIS_KEY_PREFIX: staging_
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      JAVA_CORE_URL: http://java-staging:8080
      SERVER_PORT: "8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rust-staging.rule=Host(`rust-staging.yomu.my.id`)"
        - "traefik.http.routers.rust-staging.service=rust-staging"
        - "traefik.http.routers.rust-staging.tls.certresolver=letsencrypt"
        - "traefik.http.services.rust-staging.loadbalancer.server.port=8080"
        - "traefik.http.services.rust-staging.loadbalancer.healthcheck.path=/health"

  frontend-staging:
    image: ghcr.io/advprog-2026-a14-project/yomu-frontend:staging
    env_file:
      - /opt/yomu/.env
    environment:
      CORE_API_BASE_URL: http://java-staging:8080
      RUST_ENGINE_URL: http://rust-staging:8080
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: staging
    networks:
      - yomu-overlay-net
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        max-file: "5"
        max-size: "10m"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend-staging.rule=Host(`staging.yomu.my.id`)"
        - "traefik.http.routers.frontend-staging.service=frontend-staging"
        - "traefik.http.routers.frontend-staging.tls.certresolver=letsencrypt"
        - "traefik.http.services.frontend-staging.loadbalancer.server.port=3000"
        - "traefik.http.services.frontend-staging.loadbalancer.healthcheck.path=/"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 10s

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0-alpine
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
    ports:
      - "127.0.0.1:9121:9121"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:yomu_password@postgres:5432/yomu_db?sslmode=disable
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
    ports:
      - "127.0.0.1:9187:9187"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus_data:/prometheus
      - /opt/yomu/prometheus:/etc/prometheus:ro
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 10s

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "127.0.0.1:3100:3100"
    command: >
      -config.file=/etc/loki/loki-config.yml
      -frontend.instance-addr=127.0.0.1
      -query-scheduler.ring.instance-addr=127.0.0.1
    volumes:
      - loki_data:/loki
      - /opt/yomu/loki:/etc/loki:ro
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo_data:/tmp/tempo
      - /opt/yomu/tempo:/etc/tempo:ro
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
    volumes:
      - /opt/yomu/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://monitoring.yomu.my.id/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/yomu/dashboards:/etc/grafana/provisioning/dashboards:ro
      - /opt/yomu/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - yomu-overlay-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`monitoring.yomu.my.id`)"
        - "traefik.http.routers.grafana.service=grafana"
        - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

networks:
  yomu-overlay-net:
    external: true

volumes:
  postgres_data:
  redis_data:
  postgres_staging_data:
  redis_staging_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
