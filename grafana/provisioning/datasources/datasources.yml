apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    editable: true
    jsonData:
      maxLines: 1000

  - name: Tempo
    type: tempo
    url: http://tempo:3200
    access: proxy
    editable: true
    jsonData:
      nodeGraph:
        enabled: true
      tracesToLogs:
        datasourceUid: loki
        tags:
          - job
          - instance
        mappedTags:
          - key: service.name
            value: service
        lokiSearch:
          enabled: true
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus

  - name: Jaeger
    type: jaeger
    url: http://jaeger:16686
    access: proxy
    editable: true
    isDisabled: true