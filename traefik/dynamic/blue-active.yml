http:
  routers:
    frontend-router:
      rule: "Host(`yomu.my.id`)"
      service: frontend-blue-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    api-java-router:
      rule: "Host(`yomu.my.id`) && PathPrefix(`/api/java`)"
      service: java-blue-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    api-rust-router:
      rule: "Host(`yomu.my.id`) && PathPrefix(`/api/rust`)"
      service: rust-blue-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    grafana-router:
      rule: "Host(`monitoring.yomu.my.id`)"
      service: grafana-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    prometheus-router:
      rule: "Host(`monitoring.yomu.my.id`) && PathPrefix(`/prometheus`)"
      service: prometheus-svc
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    http-catchall:
      rule: "HostRegexp(`{host:.+}`)"
      service: traefik-echo
      entryPoints:
        - web

  services:
    frontend-blue-svc:
      loadBalancer:
        servers:
          - url: "http://frontend-blue:3000"

    java-blue-svc:
      loadBalancer:
        servers:
          - url: "http://java-blue:8080"

    rust-blue-svc:
      loadBalancer:
        servers:
          - url: "http://rust-blue:8080"

    grafana-svc:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    prometheus-svc:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"

    traefik-echo:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:9999"