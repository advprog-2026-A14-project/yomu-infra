http:
  routers:
    frontend-router:
      rule: "Host(`yomu.my.id`) || PathPrefix(`/`)"
      service: frontend-blue
      entryPoints:
        - web

    java-router:
      rule: "PathPrefix(`/api/java`)"
      service: java-blue
      entryPoints:
        - web
      middlewares:
        - strip-java-prefix

    rust-router:
      rule: "PathPrefix(`/api/rust`)"
      service: rust-blue
      entryPoints:
        - web
      middlewares:
        - strip-rust-prefix

    java-subdomain:
      rule: "Host(`java.yomu.my.id`)"
      service: java-blue
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    rust-subdomain:
      rule: "Host(`rust.yomu.my.id`)"
      service: rust-blue
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    grafana-router:
      rule: "PathPrefix(`/grafana`)"
      service: grafana@docker
      entryPoints:
        - web
      middlewares:
        - strip-grafana-prefix

    prometheus-router:
      rule: "PathPrefix(`/prometheus`)"
      service: prometheus@docker
      entryPoints:
        - web
      middlewares:
        - strip-prometheus-prefix

  middlewares:
    strip-java-prefix:
      stripPrefix:
        prefixes:
          - "/api/java"

    strip-rust-prefix:
      stripPrefix:
        prefixes:
          - "/api/rust"

    strip-grafana-prefix:
      stripPrefix:
        prefixes:
          - "/grafana"

    strip-prometheus-prefix:
      stripPrefix:
        prefixes:
          - "/prometheus"

  services:
    frontend-blue:
      loadBalancer:
        servers:
          - url: "http://frontend-blue:3000"

    java-blue:
      loadBalancer:
        servers:
          - url: "http://java-blue:8080"

    rust-blue:
      loadBalancer:
        servers:
          - url: "http://rust-blue:8080"